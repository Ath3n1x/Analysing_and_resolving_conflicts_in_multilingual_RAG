# ============================================================
# XQuAD experiment configuration
# 11 languages · 3 scopes · 4 generators · 2 retrievers
# ============================================================

dataset:
  name: xquad
  split: validation
  config_template: "xquad.{lang}"
  languages: [en, de, es, el, ru, tr, ar, vi, th, zh, hi]
  max_samples: 200

chunking:
  target_tokens: 80
  overlap_sentences: 2
  chars_per_token:
    ar: 2.5
    ru: 3.5
    hi: 2.5
    th: 1.5
    zh: 1.5
    el: 3.5
    tr: 4.0
    vi: 3.0
    es: 4.0
    de: 4.5
    en: 4.5

retrieval:
  top_k:
    ar: 15
    ru: 15
    hi: 30
    th: 20
    zh: 15
    el: 20
    tr: 15
    vi: 20
    es: 15
    de: 15
    en: 15
  keep_k:
    ar: 7
    ru: 7
    hi: 7
    th: 7
    zh: 7
    el: 7
    tr: 7
    vi: 7
    es: 6
    de: 6
    en: 6
  rerank_langs: [th, hi, vi, el]
  scopes: [mono, cross, full]

generators:
  - id: aya
    model_id: CohereForAI/aya-23-8B
    torch_dtype: float16
    load_in_4bit: false
  - id: qwen
    model_id: Qwen/Qwen2.5-7B-Instruct
    torch_dtype: float16
    load_in_4bit: false
  - id: llama
    model_id: meta-llama/Meta-Llama-3-8B-Instruct
    torch_dtype: float16
    load_in_4bit: false
  - id: eurollm
    model_id: utter-project/EuroLLM-9B-Instruct
    torch_dtype: float16
    load_in_4bit: false

retrievers:
  - id: bgem3
    model_id: BAAI/bge-m3
    use_fp16: true
  - id: e5
    model_id: intfloat/multilingual-e5-large
    use_fp16: true

generation:
  max_new_tokens:
    ar: 50
    ru: 55
    hi: 55
    th: 40
    zh: 35
    el: 55
    tr: 55
    vi: 50
    es: 45
    de: 45
    en: 45
  max_answer_tokens:
    ar: 12
    ru: 15
    hi: 15
    th: 8
    zh: 8
    el: 12
    tr: 15
    vi: 12
    es: 10
    de: 10
    en: 10
  greedy: true
  repetition_penalty: 1.3

routing:
  lbs_threshold: 0.010
  hall_disqualify: 50.0
  combined_weights:
    f1: 0.45
    rhr: 0.20
    em: 0.15
    hall: 0.20

output:
  results_dir: results/xquad
  save_csv: true
  save_json: true
  plot: true
