# ============================================================
# MLQA experiment configuration
# 7 languages · 3 scopes · 4 generators · 2 retrievers
# ============================================================

dataset:
  name: facebook/mlqa
  split: test
  config_template: "mlqa.{lang}.{lang}"
  languages: [en, de, es, ar, hi, vi, zh]
  max_samples: 200

chunking:
  target_tokens: 80
  overlap_sentences: 2
  chars_per_token:
    zh: 1.5
    hi: 1.8
    ar: 2.5
    vi: 3.0
    de: 4.5
    es: 4.0
    en: 4.5

retrieval:
  top_k:
    hi: 12
    ar: 8
    vi: 8
    zh: 8
    de: 6
    es: 6
    en: 6
  rerank_langs: [ar, hi, vi, zh]
  scopes: [mono, cross, full]

generators:
  - id: aya
    model_id: CohereForAI/aya-23-8B
    torch_dtype: float16
    load_in_4bit: false
  - id: qwen
    model_id: Qwen/Qwen2.5-7B-Instruct
    torch_dtype: float16
    load_in_4bit: false
  - id: llama
    model_id: meta-llama/Meta-Llama-3-8B-Instruct
    torch_dtype: float16
    load_in_4bit: false
  - id: eurollm
    model_id: utter-project/EuroLLM-9B-Instruct
    torch_dtype: float16
    load_in_4bit: false

retrievers:
  - id: bgem3
    model_id: BAAI/bge-m3
    use_fp16: true
  - id: e5
    model_id: intfloat/multilingual-e5-large
    use_fp16: true

generation:
  max_new_tokens:
    zh: 35
    hi: 55
    ar: 50
    vi: 50
    de: 45
    es: 45
    en: 45
  max_answer_tokens:
    zh: 8
    hi: 12
    ar: 12
    vi: 12
    de: 15
    es: 15
    en: 15
  greedy: true
  repetition_penalty: 1.3

routing:
  lbs_threshold: 1.0
  hall_disqualify: 50.0

output:
  results_dir: results/mlqa
  save_csv: true
  save_json: true
  plot: true
